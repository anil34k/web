<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <!-- Heading tags from biggest (h1) to smallest (h6) -->
    <h1 style="color: blueviolet; text-align: center;"><b>WELCOME</b></h1>
    <h2 style="color: blueviolet; text-align: center;"><b>WELCOME</b></h2>
    <h3 style="color: blueviolet; text-align: center;"><b>WELCOME</b></h3>
    <h4 style="color: blueviolet; text-align: center;"><b>WELCOME</b></h4>
    <h5 style="color: blueviolet; text-align: center;"><b>WELCOME</b></h5>
    <h6 style="color: blueviolet; text-align: center;"><b>WELCOME</b></h6>

    <!-- Paragraph tag -->
    <p>This is a paragraph</p>

    <!-- Bold text -->
    <b>This is bold text</b><br>

    <!-- Italic text -->
    <i>This is italic text</i><br>

    <!-- Important text (bold with meaning) -->
    <strong>This is strong text</strong><br>

    <!-- Emphasized text (italic with meaning) -->
    <em>This is emphasized text</em><br>

    <!-- Underlined text -->
    <u>This is underline text</u><br>

    <!-- Deleted text (line through text) -->
    <del>This is deleted text</del><br>

    <!-- Highlighted text -->
    <mark>This is marked text</mark><br>
     <!-- Proper subscript example -->
    <p>Water formula: H<sub>2</sub>O</p>

    <!-- Proper superscript example -->
    <p>Ten to the power of three: 10<sup>3</sup></p>
</pre>
</body>
</html>
