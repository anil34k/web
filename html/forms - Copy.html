<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
</head>
<body>
    <h1>forms example 1</h1>
    <form method="post" action="./media tags.html" target="_blank">
        <fieldset>
            <legend align="center">login details</legend>
            <label>first name:</label>
        <input type="text" name="first name" placeholder="enter the first name">
        <label>last name:</label>
        <input type="text" name="last name" placeholder="enter the last name"><br><br>

        <label>email: <sup>*</sup></label>
        <input type="email" name="email address" placeholder="enter the email address" required><br><br>
        
        <label>password: <sup>*</sup></label>
        <input type="password" name="password" required> <br><br>
        </fieldset>
        
        <label>contact: </label>
        <input type="tel" name="contact number" placeholder="mobile number" pattern="[6-9]{1}[0-9]{9}"><br><br>
        
        <label>age:</label>
        <input type="number" name="age" placeholder="enter age" min="1" max="100"><br><br>
        
        <label>enter date of birth:</label>
        <input type="date" name="time"><br><br>
        
        <label> enter the time</label>
        <input type="time" name="time"><br><br>
        
        <label>set an alarm</label>
        <input type="datetime-local" name="datetime-local">
        <input type="month" name="month">
        <input type="week" name="week">
        <br><br> 
        
        <label>website</label>
        <input type="url" name="website" placeholder="enter the proper website url">
        <input type="search" name="data" placeholder="search anything"><br><br>
        
        <label>select the file</label>
        <input type="file" name="file"><br><br>
        <input type="color" name="color">
        <input type="range" name="range" min="0" max="10"><br><br>
        
        <label>gender:</label>
        <label for="m">male</label>
        <input type="radio" name="gender" value="male" id="m" checked>
        <label for="f">female</label>
        <input type="radio" name="gender" value="female" id="f">
        <label for="o">others</label>
        <input type="radio" name="gender" value="others" id="o" disabled><br><br>
        
        <label>language:</label>
        <label for="k">kannada</label>
        <input type="checkbox" name="language" value="kannada" id="k">
        <label for="e">english</label>
        <input type="checkbox" name="language" value="english" id="e">
        <label for="h">hindi</label>
        <input type="checkbox" name="language" value="hindi" id="h"><br><br>

        <label>places :</label>
        <select name="places">
            <option value="hsn" disabled>hassan</option>
            <option value="ban"selected>bangalore</option>
            <option value="goa">goa</option>
            <option value="oty">ooty</option>
            <option value="mys">mysore</option>
        </select><br><br>

        <textarea name="comment" rows="5" cols="50" placeholder="comment box" id=""></textarea><br><br>

        <input type="reset" value="re-enter">
        <input type="submit" value="register"><br><br>
    </form>
</body>
</html>
