<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>65. hide/show html</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h2>Example using Display (Collapses Space)</h2>
    <button id="myButton1">Hide (Display)</button>
    <br>
    <img id="myImg1" src="https://img.etimg.com/thumb/width-1200,height-1200,imgsize-123734,resizemode-75,msid-128139150/news/india/uttarakhand-transfer-of-land-adjacent-to-ima-to-set-up-islamic-institution-under-scanner.jpg" alt="Mustang" style="width: 400px; display: block; margin-top: 10px;">
    <p>This text is below the display image. It will move up when the image is hidden.</p>

    <hr>

    <h2>Example using Visibility (Preserves Space)</h2>
    <button id="myButton2">Hide (Visibility)</button>
    <br>
    <img id="myImg2" src="https://img.etimg.com/thumb/width-1200,height-1200,imgsize-123734,resizemode-75,msid-128139150/news/india/uttarakhand-transfer-of-land-adjacent-to-ima-to-set-up-islamic-institution-under-scanner.jpg" alt="Mustang" style="width: 400px; display: block; margin-top: 10px;">
    <p>This text is below the visibility image. It will stay in place even when the image is hidden.</p>

    <script src="index.js"></script>
</body>
</html>
